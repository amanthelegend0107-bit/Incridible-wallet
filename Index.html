<!DOCTYPE html>
<html>
<head>
  <title>Wallet Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .header {
      padding: 30px;
    }

    .balance {
      font-size: 32px;
      font-weight: bold;
    }

    .box {
      background: #1e293b;
      margin: 10px;
      padding: 15px;
      border-radius: 12px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
    }

    #status {
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="header">
  <div id="total" class="balance">$0.00</div>
  <div>Total Balance</div>
</div>

<div class="box">
  <button onclick="createWallet()">Create Wallet</button>
  <button onclick="loadWallet()">Load Wallet</button>

  <p id="address"></p>
  <p id="balance">0 ETH</p>
</div>

<div id="status">Ready</div>

<div class="box">
  <h3>Send</h3>
  <input id="to" placeholder="Address">
  <input id="amount" placeholder="Amount">
  <button onclick="send()">Send</button>
</div>

<div class="box">
  <h3>Receive</h3>
  <p id="receiveAddress"></p>
</div>

<!-- FUTURE FILES (we will add here later WITHOUT changing code above) -->
<script src="script.js"></script>

</body>
</html>
