<!DOCTYPE html>
<html>
<head>
  <title>Wallet Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bitcoinjs-lib@6.1.0/dist/bitcoinjs.min.js"></script>

  <style>
    body {
      margin:0;
      background:#0f172a;
      color:white;
      font-family:-apple-system, Arial;
    }

    .top {
      padding:30px 20px;
      text-align:center;
    }

    .balance {
      font-size:36px;
      font-weight:bold;
    }

    .sub {
      color:#94a3b8;
    }

    .actions {
      display:flex;
      justify-content:space-around;
      margin:20px;
    }

    .action-btn {
      background:#1e293b;
      padding:15px;
      border-radius:12px;
      width:30%;
      text-align:center;
    }

    .assets {
      padding:10px 20px;
    }

    .asset {
      display:flex;
      justify-content:space-between;
      padding:15px;
      background:#1e293b;
      border-radius:12px;
      margin-bottom:10px;
    }

    .sendBox {
      padding:20px;
      display:none;
    }

    input {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
    }
  </style>
</head>

<body>

<!-- LOCK -->
<div id="lockScreen" style="
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;">
  <h2>🔐 Wallet Locked</h2>
  <input id="pass" type="password" placeholder="Password">
  <button onclick="unlock()">Unlock</button>
</div>

<!-- HEADER -->
<div class="top">
  <div id="total" class="balance">$0.00</div>
  <div class="sub">Total Balance</div>
</div>

<!-- ACTIONS -->
<div class="actions">
  <div class="action-btn" onclick="toggleSend()">📤 Send</div>
  <div class="action-btn" onclick="showSeed()">🔐 Backup</div>
</div>

<!-- ASSETS -->
<div class="assets">
  <div class="asset">
    <span>Ethereum</span>
    <span id="balance">0</span>
  </div>

  <div class="asset">
    <span>Bitcoin</span>
    <span id="btcBalance">0</span>
  </div>
</div>

<!-- SEND -->
<div class="sendBox" id="sendBox">
  <h3>Send Crypto</h3>
  <input id="to" placeholder="Address">
  <input id="amount" placeholder="Amount">
  <button onclick="sendETH()">Send ETH</button>
  <button onclick="sendBTC()">Send BTC</button>
</div>

<script src="script.js"></script>
</body>
</html>
