<!DOCTYPE html>
<html>
<head>
  <title>Wallet Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bitcoinjs-lib@6.1.0/dist/bitcoinjs.min.js"></script>

  <style>
    body {
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    .box {
      background:#1e293b;
      margin:10px;
      padding:15px;
      border-radius:12px;
    }

    input, textarea {
      width:90%;
      padding:10px;
      margin:5px;
      border-radius:8px;
      border:none;
    }

    button {
      padding:10px;
      margin:5px;
      border-radius:8px;
      border:none;
      background:#22c55e;
      color:white;
    }
  </style>
</head>

<body>

<!-- LOCK -->
<div id="lockScreen" style="
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;">
  <h2>🔐 Enter Password</h2>
  <input id="pass" type="password">
  <button onclick="unlock()">Unlock</button>
</div>

<h2 id="total">$0.00</h2>

<div class="box">
  <button onclick="createWallet()">Create Wallet</button>
  <button onclick="loadWallet()">Load Wallet</button>

  <p id="address"></p>
  <p id="balance"></p>
  <p id="btcBalance"></p>
</div>

<div class="box">
  <h3>Send ETH</h3>
  <input id="to" placeholder="Address">
  <input id="amount" placeholder="Amount">
  <button onclick="sendETH()">Send ETH</button>
</div>

<div class="box">
  <h3>Send BTC</h3>
  <button onclick="sendBTC()">Send BTC</button>
</div>

<div class="box">
  <h3>Backup / Restore</h3>
  <button onclick="showSeed()">Show Seed</button>
  <textarea id="seedInput"></textarea>
  <button onclick="restoreWallet()">Restore</button>
</div>

<div id="history"></div>

<div id="notify" style="
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#22c55e;
padding:10px;
display:none;"></div>

<script src="script.js"></script>

</body>
</html>
